{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Carbon Footprint Tracker</title>
    <link rel="stylesheet" href="{% static 'factory/css/register.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="container">
    <!-- Form Section -->
    <div class="form-section">
        <h2>Register</h2>
        <p>Create your account</p>

<form method="POST" action="{% url 'register' %}">
    {% csrf_token %}

            <!-- Messages -->
{% if messages %}
  <div class="messages">
    {% for message in messages %}
      <div class="message {{ message.tags }}">{{ message }}</div>
    {% endfor %}
  </div>
{% endif %}

            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="first_name" placeholder="Firstname" value="{{ first_name|default:'' }}" required>
            </div>
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input type="text" name="last_name" placeholder="Lastname" value="{{ last_name|default:'' }}" required>
            </div>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" name="email" placeholder="Email" value="{{ email|default:'' }}" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" name="confirm_password" placeholder="Confirm Password" required>
            </div>

            <button type="submit">REGISTER</button>
        </form>

        <p class="login-link">Already registered? <a href="{% url 'login' %}">Login</a></p>
        <footer>2025 - All Rights Reserved</footer>
    </div>

    <!-- Image Section -->
    <div class="image-section">
        <img src="{% static 'factory/images/register.jpg' %}" alt="Carbon Footprint">
    </div>
</div>
<script>
document.querySelector("form").addEventListener("submit", function(e) {
    const password = document.querySelector("input[name='password']").value;
    const confirmPassword = document.querySelector("input[name='confirm_password']").value;
    let errorMsg = "";

    // Check if passwords match
    if (password !== confirmPassword) {
        errorMsg = "Passwords do not match.";
    }
    // Minimum length
    else if (password.length < 8) {
        errorMsg = "Password must be at least 8 characters long.";
    }
    // Must contain number
    else if (!/\d/.test(password)) {
        errorMsg = "Password must contain at least one number.";
    }
    // Must contain uppercase
    else if (!/[A-Z]/.test(password)) {
        errorMsg = "Password must contain at least one uppercase letter.";
    }
    // Must contain special character
    else if (!/[!@#$%^&*]/.test(password)) {
        errorMsg = "Password must contain at least one special character (!@#$%^&*).";
    }

    if (errorMsg) {
        e.preventDefault(); // stop form submission
        // Show error message on page
        let messagesDiv = document.querySelector(".messages");
        if (!messagesDiv) {
            messagesDiv = document.createElement("div");
            messagesDiv.classList.add("messages");
            document.querySelector("form").prepend(messagesDiv);
        }
        messagesDiv.innerHTML = `<div class="message error">${errorMsg}</div>`;
        return false;
    }
});
</script>


</body>
</html>
