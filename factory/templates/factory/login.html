{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Carbon Footprint Tracker</title>
  <link rel="stylesheet" href="{% static 'factory/css/style.css' %}">
</head>
<body class="login-page">

  <div class="login-container">
<form method="POST" action="{% url 'login' %}" autocomplete="off">
    {% csrf_token %}
    
    <h2>Sign In</h2>
     <!-- Display messages -->
    {% if messages %}
    <ul class="messages">
        {% for message in messages %}
        <li class="{{ message.tags }}">{{ message }}</li>
        {% endfor %}
    </ul>
    {% endif %}
      <!-- Email Field -->
    <input type="email" name="email" placeholder="Username" required autocomplete="off">

      <!-- Password Field -->
    <input type="password" name="password" placeholder="Password" required autocomplete="new-password">

      <!-- Submit Button -->
      <button type="submit">LOGIN</button>

      <!-- Remember me and Forgot Password -->
      <div class="options">
        <label><input type="checkbox"> Remember me</label>
         <a href="{% url 'forgot_password' %}">Forgot password?</a>
      </div>

      <!-- Register link -->
      <div class="register">
        Don't have an account? <a href="{% url 'register' %}">REGISTER HERE</a>
      </div>
      
     <a href="{% url 'homepage' %}" class="back-btn">← Back to Home</a>
      
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
