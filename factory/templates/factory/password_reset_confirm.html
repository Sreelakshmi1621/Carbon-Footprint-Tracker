{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password - Carbon Footprint Tracker</title>
  <link rel="stylesheet" href="{% static 'factory/css/forgot-password.css' %}">
</head>
<body class="forgot-page">

  <div class="forgot-container">
    <form method="POST">
      {% csrf_token %}
      <h2>Reset Your Password</h2>
      <p>Enter your new password below.</p>

      {{ form.as_p }}

      <button type="submit">Reset Password</button>
    </form>
  </div>

</body>
</html>
