{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password</title>
  <link rel="stylesheet" href="{% static 'factory/css/change_password.css' %}">
</head>
<body>

  <!-- Back button as image -->
  <img src="{% static 'factory/images/homepic.png' %}" class="back-btn" alt="Back" onclick="window.history.back()">

  <!-- Change Password Section -->
  <section>
    <h2>Change Password</h2>

<form id="changePasswordForm" method="POST" action="{% url 'change_password' %}">
    {% csrf_token %}
  
  <!-- Messages from Django -->
  {% if messages %}
    <div class="messages">
      {% for message in messages %}
        <div class="message {{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}

  <div>
    <label for="currentPassword">Current Password</label>
    <input type="password" id="currentPassword" name="currentPassword" placeholder="Enter current password" required>
  </div>

  <div>
    <label for="newPassword">New Password</label>
    <input type="password" id="newPassword" name="newPassword" placeholder="Enter new password" required>
  </div>

  <div>
    <label for="confirmPassword">Confirm New Password</label>
    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm new password" required>
  </div>

  <div class="form-actions">
    <button type="submit">Update Password</button>
    <button type="button" onclick="window.history.back()">Cancel</button>
  </div>
</form>
  </section>

  <script src="change_password.js"></script>
</body>
</html>
